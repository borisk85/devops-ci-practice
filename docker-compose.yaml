services:

  db:
    image: postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    build: .
    depends_on:
      - db

  frontend:
    image: nginx
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
